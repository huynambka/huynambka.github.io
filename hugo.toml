baseURL = 'https://huynambka.github.io/'
languageCode = 'vn'
title = 'shibajutsu'
theme = 'archie'
copyright = "© shibajutsu"
pygmentsstyle = "monokai"
pygmentscodefences = true
pygmentscodefencesguesssyntax = true

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    style = "monokai"
    noClasses = true
  [markup.goldmark.renderer]
    unsafe = true

[outputs]
home = ["HTML", "RSS", "JSON"]

[params]
mode = "toggle"
useCDN = false
subtitle = "Dối lòng sẽ bị quạ bắt diều hâu tha"
customCSS = ["css/custom.css"]
customJS = [
	"https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js",
	"js/mermaid-init.js"
]
mathjax = true # enable MathJax support
katex = true # enable KaTeX support
favicon = "favicon.png"

[[params.social]]
name = "GitHub"
icon = "github"
url = "https://github.com/huynambka"

[[params.social]]
name = "LinkedIn"
icon = "linkedin"
url = "https://linkedin.com/in/huynambka/"

[[menu.main]]
name = "Home"
url = "/"
weight = 1

[[menu.main]]
name = "Posts"
url = "/posts"
weight = 2

[[menu.main]]
name = "About"
url = "/about"
weight = 3

[[menu.main]]
name = "Tags"
url = "/tags"
weight = 4

[[menu.main]]
name = "Search"
